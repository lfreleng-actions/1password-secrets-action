---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: "🔐 1Password Secrets Action"
description: 'Securely retrieves secrets from 1Password vaults'

branding:
  icon: "lock"
  color: "blue"

inputs:
  token:
    description: "1Password service account token"
    required: true
  vault:
    description: "Vault name or ID where secrets are stored"
    required: true
  record:
    description: |
      Secret specification in one of these formats:
      - Single: "secret-name/field-name"
      - Multiple JSON: {"key1": "secret1/field1", "key2": "secret2/field2"}
      - Multiple YAML: "key1: secret1/field1\nkey2: secret2/field2"
    required: true

  return_type:
    description: "How to return values: 'output' (default), 'env', or 'both'"
    required: false
    default: "output"

  config_file:
    description: "Path to configuration file"
    required: false

  timeout:
    description: "Operation timeout in seconds"
    required: false
    default: "300"

  retry_timeout:
    description: "Retry timeout in seconds"
    required: false
    default: "30"

  connect_timeout:
    description: "Connection timeout in seconds"
    required: false
    default: "10"

  max_concurrency:
    description: "Maximum concurrent operations"
    required: false
    default: "5"

  cache_enabled:
    description: "Enable caching for improved performance"
    required: false
    default: "false"

  cache_ttl:
    description: "Cache time-to-live in seconds"
    required: false
    default: "300"

  cli_version:
    description: >-
      1Password CLI version to use ('latest' or semver like 'v2.18.0')
    required: false
    default: "latest"

  cli_path:
    description: "Custom path to 1Password CLI binary"
    required: false

  log_level:
    description: "Log level: 'debug', 'info', 'warn', 'error'"
    required: false
    default: "warn"

  debug:
    description: "Enable debug logging"
    required: false
    default: "false"

  mock_mode:
    description: "Enable mock mode for testing"
    required: false
    default: "false"

  download_url:
    description: "Custom download URL for the op-secrets-action binary"
    required: false

  checksum:
    description: "Expected SHA256 checksum for the op-secrets-action binary"
    required: false

outputs:
  value:
    description: "Secret value (for single secret retrieval)"
    value: ${{ steps.retrieve.outputs.value }}

  secrets_count:
    description: "Number of secrets retrieved (for multiple secrets)"
    value: ${{ steps.retrieve.outputs.secrets_count }}

runs:
  using: "composite"
  steps:
    - name: "Retrieve 1Password Secrets"
      id: retrieve
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        # Build and execute the 1Password secrets retrieval binary
        set -euo pipefail

        # Determine architecture and OS
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case $ARCH in
          x86_64) ARCH="amd64" ;;
          arm64|aarch64) ARCH="arm64" ;;
          *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
        esac

        # Set binary name
        BINARY_NAME="op-secrets-action-${OS}-${ARCH}"

        # Check if custom download URL is provided, otherwise build locally
        if [ -n "$ACTION_DOWNLOAD_URL" ]; then
          echo "::group::Downloading 1Password Secrets Action binary"
          echo "Download URL: $ACTION_DOWNLOAD_URL"
          curl -fsSL -o "${BINARY_NAME}" "$ACTION_DOWNLOAD_URL"

          # Require checksum when using custom download URL and verify it (cross-platform)
          if [ -z "$ACTION_CHECKSUM" ]; then
            echo "::error::Custom download URL provided but no checksum specified. Please provide the 'checksum' input."
            exit 1
          fi
          echo "Verifying checksum..."
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL_CHECKSUM=$(sha256sum "${BINARY_NAME}" | cut -d' ' -f1)
          elif command -v shasum >/dev/null 2>&1; then
            ACTUAL_CHECKSUM=$(shasum -a 256 "${BINARY_NAME}" | awk '{print $1}')
          else
            echo "::error::No SHA-256 tool found (sha256sum or shasum)"
            exit 1
          fi
          if [ "${ACTUAL_CHECKSUM}" != "$ACTION_CHECKSUM" ]; then
            echo "::error::Checksum verification failed!"
            echo "::error::Expected: $ACTION_CHECKSUM"
            echo "::error::Actual: ${ACTUAL_CHECKSUM}"
            exit 1
          fi
          echo "Checksum verification passed"
          echo "::endgroup::"
        else
          echo "::group::Building 1Password Secrets Action binary"

          # Check if we have Go installed
          if ! command -v go &> /dev/null; then
            echo "::error::Go is not installed and no download_url provided"
            echo "::error::Please install Go or provide a custom download_url"
            exit 1
          fi

          # Build the binary locally
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")

          echo "Building binary locally..."
          echo "Version: ${VERSION}"
          echo "Build Time: ${BUILD_TIME}"
          echo "Git Commit: ${GIT_COMMIT}"

          CGO_ENABLED=0 GOOS="${OS}" GOARCH="${ARCH}" go build \
            -ldflags="-s -w -X main.Version=${VERSION} -X \
            main.BuildTime=${BUILD_TIME} -X main.GitCommit=${GIT_COMMIT}" \
            -o "${BINARY_NAME}" \
            ./cmd/op-secrets-action

          echo "✅ Built binary locally"
          echo "::endgroup::"
        fi

        # Make executable
        chmod +x "${BINARY_NAME}"

        # Execute the binary with inputs.
        # vault and record are passed via environment variables to avoid shell escaping issues with multiline JSON.
        # Build the optional flags as an argv array so values such as a
        # config_file path containing spaces stay a single argument and
        # are not subject to word-splitting or glob expansion.
        args=()
        if [ -n "$OP_RETURN_TYPE" ]; then
          args+=("--return-type=$OP_RETURN_TYPE")
        fi
        if [ -n "$OP_CONFIG_FILE" ]; then
          args+=("--config=$OP_CONFIG_FILE")
        fi
        if [ -n "$OP_TIMEOUT" ]; then
          args+=("--timeout=$OP_TIMEOUT")
        fi
        if [ -n "$OP_MAX_CONCURRENCY" ]; then
          args+=("--max-concurrency=$OP_MAX_CONCURRENCY")
        fi
        if [ -n "$OP_CLI_VERSION" ]; then
          args+=("--cli-version=$OP_CLI_VERSION")
        fi
        if [ "$OP_CACHE_ENABLED" = "true" ]; then
          args+=("--cache")
        fi
        if [ "$DEBUG" = "true" ]; then
          args+=("--debug")
        fi
        if [ "$MOCK_MODE" = "true" ]; then
          args+=("--mock")
        fi
        ./"${BINARY_NAME}" "${args[@]}"

        # Clean up the binary
        rm -f "${BINARY_NAME}"
      env:
        OP_TOKEN: ${{ inputs.token }}
        OP_VAULT: ${{ inputs.vault }}
        OP_RECORD: ${{ inputs.record }}
        OP_RETURN_TYPE: ${{ inputs.return_type }}
        OP_CONFIG_FILE: ${{ inputs.config_file }}
        OP_TIMEOUT: ${{ inputs.timeout }}
        OP_RETRY_TIMEOUT: ${{ inputs.retry_timeout }}
        OP_CONNECT_TIMEOUT: ${{ inputs.connect_timeout }}
        OP_MAX_CONCURRENCY: ${{ inputs.max_concurrency }}
        OP_CACHE_ENABLED: ${{ inputs.cache_enabled }}
        OP_CACHE_TTL: ${{ inputs.cache_ttl }}
        OP_CLI_VERSION: ${{ inputs.cli_version }}
        OP_CLI_PATH: ${{ inputs.cli_path }}
        OP_LOG_LEVEL: ${{ inputs.log_level }}
        DEBUG: ${{ inputs.debug }}
        ACTION_DOWNLOAD_URL: ${{ inputs.download_url }}
        ACTION_CHECKSUM: ${{ inputs.checksum }}
        MOCK_MODE: ${{ inputs.mock_mode }}
